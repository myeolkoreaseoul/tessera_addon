<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiwi — 이지바로 집행내역 다운로드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; background: #f5f7fa; color: #333; }

    .header { background: #2d6a4f; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .ver { font-size: 12px; opacity: 0.7; }

    .container { max-width: 860px; margin: 20px auto; padding: 0 20px; }

    .section { background: white; border-radius: 8px; border: 1px solid #e0e0e0; padding: 20px; margin-bottom: 16px; }
    .section-title { font-size: 14px; font-weight: 600; color: #2d6a4f; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .section-title .num { background: #2d6a4f; color: white; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }

    .row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
    .row label { font-size: 13px; color: #666; min-width: 70px; }
    .row .path { flex: 1; font-size: 13px; background: #f9f9f9; border: 1px solid #ddd; border-radius: 4px; padding: 8px 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 500; transition: background 0.15s; }
    .btn-primary { background: #2d6a4f; color: white; }
    .btn-primary:hover { background: #1b4332; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }
    .btn-outline { background: white; color: #2d6a4f; border: 1px solid #2d6a4f; }
    .btn-outline:hover { background: #f0faf4; }
    .btn-danger { background: #d32f2f; color: white; }
    .btn-danger:hover { background: #b71c1c; }
    .btn-warning { background: #f57c00; color: white; }
    .btn-warning:hover { background: #e65100; }

    .dropzone { border: 2px dashed #ccc; border-radius: 8px; padding: 30px; text-align: center; color: #999; font-size: 13px; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
    .dropzone:hover, .dropzone.dragover { border-color: #2d6a4f; background: #f0faf4; color: #2d6a4f; }
    .dropzone.uploaded { border-color: #2d6a4f; border-style: solid; background: #f0faf4; color: #333; }

    .guide { font-size: 13px; color: #555; line-height: 1.8; }
    .guide ol { padding-left: 20px; }

    .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    .status-dot.connected { background: #4caf50; }
    .status-dot.disconnected { background: #ccc; }
    .status-dot.warning { background: #ff9800; }

    .session-indicator { font-size: 12px; color: #888; margin-left: 8px; }
    .session-indicator.ok { color: #4caf50; }
    .session-indicator.warn { color: #ff9800; }

    .login-status { font-size: 12px; margin-left: 12px; }
    .login-status.ok { color: #4caf50; }
    .login-status.no { color: #d32f2f; }

    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    thead th { background: #f5f5f5; padding: 8px 10px; text-align: left; border-bottom: 2px solid #ddd; font-weight: 600; position: sticky; top: 0; }
    tbody td { padding: 6px 10px; border-bottom: 1px solid #eee; }
    tbody tr:hover { background: #fafafa; }
    .table-wrap { max-height: 280px; overflow-y: auto; border: 1px solid #e0e0e0; border-radius: 4px; }

    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }
    .badge-wait { background: #e0e0e0; color: #666; }
    .badge-running { background: #fff3e0; color: #e65100; }
    .badge-done { background: #e8f5e9; color: #2e7d32; }
    .badge-fail { background: #ffebee; color: #c62828; }
    .badge-retry { background: #fff8e1; color: #f57f17; }
    .badge-paused { background: #e3f2fd; color: #1565c0; }

    .progress-wrap { margin: 8px 0; }
    .progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: #2d6a4f; transition: width 0.3s; border-radius: 3px; }
    .progress-text { font-size: 12px; color: #666; margin-top: 4px; }

    .bottom-bar { display: flex; gap: 12px; justify-content: center; margin-top: 8px; flex-wrap: wrap; }

    .file-info { font-size: 12px; color: #2d6a4f; margin-top: 8px; font-weight: 500; }
    .summary { font-size: 13px; color: #666; text-align: right; margin: 4px 0; }

    .alert-banner { padding: 10px 16px; border-radius: 6px; margin-bottom: 12px; display: none; align-items: center; justify-content: space-between; font-size: 13px; }
    .alert-banner.show { display: flex; }
    .alert-warning { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
    .alert-error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
    .alert-banner .alert-close { cursor: pointer; font-size: 16px; font-weight: bold; margin-left: 12px; opacity: 0.6; background: none; border: none; color: inherit; padding: 0; }
    .alert-banner .alert-close:hover { opacity: 1; }

    .merge-info { font-size: 12px; color: #2d6a4f; margin-top: 4px; font-weight: 500; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Kiwi</h1>
    <span class="ver">이지바로 집행내역 다운로드 v2.1.0</span>
  </div>

  <div class="container">
    <!-- 경고 배너 -->
    <div class="alert-banner" id="alertBanner">
      <span id="alertMessage"></span>
      <button class="alert-close" onclick="dismissAlert()">&times;</button>
    </div>

    <!-- 저장 위치 -->
    <div class="section">
      <div class="row">
        <label>저장 위치</label>
        <div class="path" id="downloadDir">설정되지 않음</div>
        <button class="btn-outline" onclick="selectFolder()">변경</button>
      </div>
    </div>

    <!-- 1. 브라우저 -->
    <div class="section">
      <div class="section-title"><span class="num">1</span> 브라우저</div>
      <div style="display:flex; align-items:center; gap:16px; margin-bottom:12px; flex-wrap:wrap;">
        <button class="btn-primary" id="btnBrowser" onclick="launchBrowser()">브라우저 열기</button>
        <span>
          <span class="status-dot disconnected" id="browserDot"></span>
          <span id="browserStatus" style="font-size:13px; color:#666;">미연결</span>
          <span class="login-status" id="loginStatus"></span>
          <span class="session-indicator" id="sessionIndicator"></span>
        </span>
        <button class="btn-outline" id="btnNavigate" onclick="autoNavigate()" style="display:none;">자동 이동</button>
      </div>
      <div class="guide">
        <ol>
          <li>위 버튼을 클릭하여 브라우저를 실행하세요.</li>
          <li>이지바로에 로그인하세요.</li>
          <li><strong>자동 이동</strong> 버튼을 클릭하거나, 수동으로 상시점검 관리 화면으로 이동하세요.</li>
          <li>이동 완료 후, 아래 과제 목록을 업로드하세요.</li>
        </ol>
      </div>
    </div>

    <!-- 2. 과제 목록 -->
    <div class="section">
      <div class="section-title"><span class="num">2</span> 과제 목록</div>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        엑셀 파일을 여기에 끌어다 놓거나 클릭하여 선택하세요
      </div>
      <input type="file" id="fileInput" accept=".xlsx,.xls" style="display:none" onchange="handleFile(this.files[0])">
      <div class="file-info" id="fileInfo"></div>

      <div id="tableArea" style="display:none; margin-top:12px;">
        <div class="summary" id="summary"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>사업년도</th>
                <th>과제번호</th>
                <th>연구수행기관</th>
                <th>연구책임자</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="taskBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- 3. 실행 -->
    <div class="section">
      <div class="section-title"><span class="num">3</span> 실행</div>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        <div class="progress-text" id="progressText">대기 중</div>
      </div>
      <div class="merge-info" id="mergeInfo" style="display:none;"></div>
      <div class="bottom-bar">
        <button class="btn-primary" id="btnStart" onclick="startDownload()" disabled>시작</button>
        <button class="btn-warning" id="btnPause" onclick="togglePause()" style="display:none">일시정지</button>
        <button class="btn-danger" id="btnStop" onclick="stopDownload()" style="display:none">중지</button>
        <button class="btn-outline" id="btnRetry" onclick="retryFailed()" style="display:none">실패분 재시도</button>
        <button class="btn-outline" id="btnOpenFolder" onclick="openFolder()" style="display:none">폴더 열기</button>
      </div>
    </div>
  </div>

  <script>
    let pollTimer = null;
    let isPolling = false;
    let audioCtx = null;
    let lastRunning = false;

    // AudioContext 생성 (사용자 인터랙션 시점)
    function ensureAudioCtx() {
      if (!audioCtx) {
        try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
      }
    }

    // 저장 폴더 선택
    async function selectFolder() {
      ensureAudioCtx();
      if (window.kiwi) {
        const dir = await window.kiwi.selectFolder();
        if (dir) setDownloadDir(dir);
      } else {
        const dir = prompt('저장 폴더 경로를 입력하세요:');
        if (dir) setDownloadDir(dir);
      }
    }

    async function setDownloadDir(dir) {
      await fetch('/api/set-download-dir', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dir }),
      });
      document.getElementById('downloadDir').textContent = dir;
      localStorage.setItem('kiwi_downloadDir', dir);
      checkReady();
    }

    // 브라우저 열기
    async function launchBrowser() {
      ensureAudioCtx();
      const btn = document.getElementById('btnBrowser');
      btn.disabled = true;
      btn.textContent = '연결 중...';
      try {
        const res = await fetch('/api/browser/launch', { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          setBrowserStatus(true);
          updateLoginStatus(data.loginOk);
          document.getElementById('btnNavigate').style.display = '';
        } else {
          alert('브라우저 연결 실패: ' + (data.error || ''));
          setBrowserStatus(false);
        }
      } catch (e) {
        alert('오류: ' + e.message);
        setBrowserStatus(false);
      }
      btn.disabled = false;
      btn.textContent = '브라우저 열기';
    }

    function setBrowserStatus(connected) {
      const dot = document.getElementById('browserDot');
      const text = document.getElementById('browserStatus');
      dot.className = 'status-dot ' + (connected ? 'connected' : 'disconnected');
      text.textContent = connected ? '연결됨' : '미연결';
      if (connected) {
        document.getElementById('btnNavigate').style.display = '';
      }
      checkReady();
    }

    function updateLoginStatus(loginOk) {
      const el = document.getElementById('loginStatus');
      if (loginOk) {
        el.className = 'login-status ok';
        el.textContent = '로그인됨';
      } else {
        el.className = 'login-status no';
        el.textContent = '로그인 필요';
      }
    }

    function updateSessionIndicator(sessionOk) {
      const el = document.getElementById('sessionIndicator');
      if (sessionOk) {
        el.className = 'session-indicator ok';
        el.textContent = '세션 유지중';
      } else {
        el.className = 'session-indicator warn';
        el.textContent = '세션 확인 필요';
      }
    }

    // 자동 네비게이션
    async function autoNavigate() {
      ensureAudioCtx();
      const btn = document.getElementById('btnNavigate');
      btn.disabled = true;
      btn.textContent = '이동 중...';
      try {
        const res = await fetch('/api/navigate', { method: 'POST' });
        const data = await res.json();
        if (data.ok) {
          alert(data.message);
        } else {
          alert(data.message || '이동 실패');
        }
      } catch (e) {
        alert('오류: ' + e.message);
      }
      btn.disabled = false;
      btn.textContent = '자동 이동';
    }

    // 파일 업로드
    const dropzone = document.getElementById('dropzone');
    dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => { dropzone.classList.remove('dragover'); });
    dropzone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
    });

    async function handleFile(file) {
      if (!file) return;
      ensureAudioCtx();
      const form = new FormData();
      form.append('file', file);
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: form });
        const data = await res.json();
        if (data.ok) {
          dropzone.classList.add('uploaded');
          dropzone.textContent = data.fileName;
          document.getElementById('fileInfo').textContent = `${data.count}건 로드됨`;
          refreshTable();
        } else {
          alert('파일 오류: ' + (data.error || ''));
        }
      } catch (e) {
        alert('업로드 실패: ' + e.message);
      }
    }

    async function refreshTable() {
      const res = await fetch('/api/state');
      const data = await res.json();
      const tbody = document.getElementById('taskBody');
      tbody.innerHTML = '';
      data.tasks.forEach((t, i) => {
        const tr = document.createElement('tr');
        const cells = [i + 1, t.사업년도, t.과제번호, t.연구수행기관, t.연구책임자];
        cells.forEach(v => {
          const td = document.createElement('td');
          td.textContent = v;
          tr.appendChild(td);
        });
        const tdStatus = document.createElement('td');
        const badge = document.createElement('span');
        badge.className = 'badge badge-' + badgeClass(t.status);
        badge.textContent = t.status;
        if (t.status === '실패' && t.reason) {
          badge.title = t.reason;
          badge.style.cursor = 'help';
        }
        tdStatus.appendChild(badge);
        tr.appendChild(tdStatus);
        tbody.appendChild(tr);
      });
      document.getElementById('tableArea').style.display = 'block';
      document.getElementById('summary').textContent = `총 ${data.tasks.length}건`;
      checkReady();
    }

    function badgeClass(status) {
      if (status === '완료') return 'done';
      if (status === '진행중') return 'running';
      if (status === '실패') return 'fail';
      return 'wait';
    }

    function checkReady() {
      const dir = document.getElementById('downloadDir').textContent;
      const hasDir = dir && dir !== '설정되지 않음';
      const dot = document.getElementById('browserDot');
      const connected = dot.classList.contains('connected');
      const tbody = document.getElementById('taskBody');
      const hasTasks = tbody && tbody.children.length > 0;
      document.getElementById('btnStart').disabled = !(hasDir && connected && hasTasks);
    }

    // 시작
    async function startDownload() {
      ensureAudioCtx();
      try { Notification.requestPermission(); } catch {}
      const res = await fetch('/api/start', { method: 'POST' });
      const data = await res.json();
      if (!data.ok) { alert(data.error || '시작 실패'); return; }
      lastRunning = true;
      document.getElementById('btnStart').style.display = 'none';
      document.getElementById('btnPause').style.display = '';
      document.getElementById('btnStop').style.display = '';
      document.getElementById('btnRetry').style.display = 'none';
      document.getElementById('mergeInfo').style.display = 'none';
      startPolling();
    }

    async function stopDownload() {
      await fetch('/api/stop', { method: 'POST' });
    }

    async function togglePause() {
      ensureAudioCtx();
      try {
        const res = await fetch('/api/pause', { method: 'POST' });
        const data = await res.json();
        const btn = document.getElementById('btnPause');
        if (data.paused) {
          btn.textContent = '재개';
          btn.className = 'btn-primary';
        } else {
          btn.textContent = '일시정지';
          btn.className = 'btn-warning';
        }
      } catch (e) {
        alert('오류: ' + e.message);
      }
    }

    async function retryFailed() {
      ensureAudioCtx();
      const res = await fetch('/api/retry-failed', { method: 'POST' });
      const data = await res.json();
      if (data.error) { alert(data.error); return; }
      if (data.retryCount) {
        lastRunning = true;
        document.getElementById('btnStart').style.display = 'none';
        document.getElementById('btnPause').style.display = '';
        document.getElementById('btnStop').style.display = '';
        document.getElementById('btnRetry').style.display = 'none';
        startPolling();
      } else {
        alert(data.message || '재시도 대상 없음');
      }
    }

    // 경고 관련
    function showAlert(msg, type) {
      const banner = document.getElementById('alertBanner');
      const msgEl = document.getElementById('alertMessage');
      msgEl.textContent = msg;
      banner.className = 'alert-banner show ' + (type === 'error' ? 'alert-error' : 'alert-warning');
    }

    function hideAlert() {
      document.getElementById('alertBanner').className = 'alert-banner';
    }

    async function dismissAlert() {
      hideAlert();
      try { await fetch('/api/dismiss-alert', { method: 'POST' }); } catch {}
    }

    // 배치 완료 알림
    function notifyBatchDone(okCount, failCount) {
      // 소리
      if (audioCtx) {
        try {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.frequency.value = 800;
          gain.gain.value = 0.3;
          osc.start();
          osc.stop(audioCtx.currentTime + 0.2);
          setTimeout(() => {
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.value = 1200;
            gain2.gain.value = 0.3;
            osc2.start();
            osc2.stop(audioCtx.currentTime + 0.3);
          }, 250);
        } catch {}
      }

      // 데스크탑 알림
      if (Notification.permission === 'granted') {
        try {
          new Notification('Kiwi 다운로드 완료', {
            body: `성공 ${okCount}건, 실패 ${failCount}건`,
            icon: '/favicon.ico',
          });
        } catch {}
      }
    }

    function startPolling() {
      stopPolling();
      pollTimer = setInterval(pollState, 1000);
    }
    function stopPolling() {
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }

    async function pollState() {
      if (isPolling) return;
      isPolling = true;
      try {
        const res = await fetch('/api/state');
        const data = await res.json();

        // 브라우저 상태
        setBrowserStatus(data.browserConnected);
        updateLoginStatus(data.loginOk);
        updateSessionIndicator(data.sessionOk);

        // 경고 배너
        if (data.alert) {
          showAlert(data.alert.message, data.alert.type);
        } else {
          hideAlert();
        }

        // 일시정지 버튼 상태 동기화
        const btnPause = document.getElementById('btnPause');
        if (data.paused) {
          btnPause.textContent = '재개';
          btnPause.className = 'btn-primary';
        } else {
          btnPause.textContent = '일시정지';
          btnPause.className = 'btn-warning';
        }

        // 테이블 업데이트
        const rows = document.getElementById('taskBody').children;
        data.tasks.forEach((t, i) => {
          if (rows[i]) {
            const badge = rows[i].querySelector('.badge');
            badge.className = 'badge badge-' + badgeClass(t.status);
            badge.textContent = t.status;
            if (t.status === '실패' && t.reason) {
              badge.title = t.reason;
              badge.style.cursor = 'help';
            }
          }
        });

        // 진행바
        const done = data.tasks.filter(t => t.status === '완료' || t.status === '실패').length;
        const pct = data.tasks.length ? Math.round(done / data.tasks.length * 100) : 0;
        document.getElementById('progressFill').style.width = pct + '%';

        const roundLabel = data.retryRound > 0 ? ` [재시도 ${data.retryRound}]` : '';
        const pauseLabel = data.paused ? ' (일시정지)' : '';

        if (data.running && data.currentIdx >= 0) {
          const cur = data.tasks[data.currentIdx];
          document.getElementById('progressText').textContent =
            `${done}/${data.tasks.length}${roundLabel}${pauseLabel} — ${cur ? cur.과제번호 + ' ' + cur.연구수행기관 : ''} 다운로드 중`;
        } else if (!data.running && lastRunning) {
          // 방금 완료됨
          lastRunning = false;
          const ok = data.tasks.filter(t => t.status === '완료').length;
          const fail = data.tasks.filter(t => t.status === '실패').length;
          document.getElementById('progressText').textContent =
            `완료 — 성공 ${ok}건, 실패 ${fail}건`;

          document.getElementById('btnStart').style.display = '';
          document.getElementById('btnPause').style.display = 'none';
          document.getElementById('btnStop').style.display = 'none';
          document.getElementById('btnOpenFolder').style.display = '';

          if (fail > 0) {
            document.getElementById('btnRetry').style.display = '';
          }

          if (data.mergedFile) {
            const mergeEl = document.getElementById('mergeInfo');
            mergeEl.textContent = `병합 파일: ${data.mergedFile}`;
            mergeEl.style.display = 'block';
          }

          notifyBatchDone(ok, fail);
          stopPolling();
        } else if (!data.running) {
          document.getElementById('progressText').textContent = '대기 중';
        }

        // 현재 진행 행으로 스크롤
        if (data.currentIdx >= 0 && rows[data.currentIdx]) {
          rows[data.currentIdx].scrollIntoView({ block: 'nearest' });
        }
      } catch {} finally {
        isPolling = false;
      }
    }

    function openFolder() {
      const dir = document.getElementById('downloadDir').textContent;
      if (window.kiwi) {
        window.kiwi.openFolder(dir);
      } else {
        alert('폴더: ' + dir);
      }
    }

    // 초기화
    (async function init() {
      const saved = localStorage.getItem('kiwi_downloadDir');
      if (saved) {
        await setDownloadDir(saved);
      }

      try {
        const res = await fetch('/api/browser/status');
        const data = await res.json();
        setBrowserStatus(data.connected);
        if (data.connected) {
          document.getElementById('btnNavigate').style.display = '';
        }
      } catch {}
    })();
  </script>
</body>
</html>
